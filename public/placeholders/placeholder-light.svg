<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Emplacement image — Domaine des Élégances">
  <rect width="1200" height="900" fill="#f1e9d8"/>
  <rect x="0" y="0" width="1200" height="900" fill="url(#grad)" opacity="0.55"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#e8dcc2"/>
    </linearGradient>
  </defs>
  <g stroke="#c2a368" stroke-width="1" fill="none" opacity="0.55">
    <rect x="40" y="40" width="1120" height="820"/>
    <rect x="60" y="60" width="1080" height="780" opacity="0.5"/>
  </g>
  <g transform="translate(600 450)" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text y="-10" font-size="36" fill="#a8895c" letter-spacing="6">DOMAINE</text>
    <text y="40" font-size="18" fill="#6b645a" letter-spacing="10">DES ÉLÉGANCES</text>
    <line x1="-80" y1="70" x2="80" y2="70" stroke="#c2a368" stroke-width="1"/>
    <text y="110" font-size="12" fill="#8c8478" letter-spacing="4">IMAGE PLACEHOLDER</text>
  </g>
</svg>
